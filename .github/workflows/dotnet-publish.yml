name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: loggingway.nl
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R deployuser:deployuser /opt/loggingway
      
      - name: Publish
        run: dotnet publish -c Release -r linux-x64 --self-contained false -o ./publish

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: loggingway.nl
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./publish/*"
          target: /opt/loggingway/
          strip_components: 1
          exclude: "appsettings.json"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: loggingway.nl
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R loggingway:loggingway /opt/loggingway
            sudo systemctl restart loggingway
